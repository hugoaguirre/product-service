version: "2"
sql:
  - schema: "internal/adapters/db/migrations/schema.sql"
    queries: "internal/adapters/db/product_query.sql"
    engine: "sqlite"
    gen:
      go:
        package: "generated"
        out: "internal/adapters/db/generated"
        emit_json_tags: true
        emit_prepared_queries: false
